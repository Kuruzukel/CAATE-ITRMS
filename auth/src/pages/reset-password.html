<!DOCTYPE html>
<html lang="en" class="light-style customizer-hide" dir="ltr" data-theme="theme-default" data-assets-path="../assets/"
    data-template="vertical-menu-template-free">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

    <title>CAATE | Reset Password</title>

    <meta name="description" content="" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico?v=1" />
    <link rel="shortcut icon" type="image/x-icon" href="../assets/images/favicon.ico?v=1" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
        rel="stylesheet" />

    <!-- Icons -->
    <link rel="stylesheet" href="../assets/css/boxicons.css" />

    <!-- Core CSS -->
    <link rel="stylesheet" href="../assets/css/core.css" class="template-customizer-core-css" />
    <link rel="stylesheet" href="../assets/css/theme-default.css" class="template-customizer-theme-css" />
    <link rel="stylesheet" href="../assets/css/demo.css" />

    <!-- Vendors CSS -->
    <link rel="stylesheet" href="../assets/css/perfect-scrollbar.css" />

    <!-- Page CSS -->
    <link rel="stylesheet" href="../assets/css/page-auth.css" />

    <!-- Custom Auth CSS -->
    <link rel="stylesheet" href="../assets/css/auth-custom.css" />

    <!-- Toast CSS -->
    <link rel="stylesheet" href="../assets/css/auth-toast.css" />

    <!-- Helpers -->
    <script src="../assets/js/helpers.js"></script>
    <script src="../assets/js/config.js"></script>
</head>

<body>
    <!-- Dark Overlay -->
    <div class="dark-overlay"></div>

    <!-- Animated Orbs -->
    <div class="orbs-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>

    <!-- Content -->
    <div class="container-xxl">
        <div class="authentication-wrapper authentication-basic container-p-y">
            <div class="authentication-inner">
                <!-- Reset Password Card -->
                <div class="card">
                    <div class="card-body">
                        <!-- Logo -->
                        <div class="hero-logos">
                            <img src="../assets/images/ROUNDCAATELOGO.png" alt="CAATE Logo"
                                class="hero-logo caate-logo" />
                        </div>

                        <h4 class="mb-2">Reset Password</h4>
                        <p class="mb-4">Enter your new password below</p>

                        <form id="formResetPassword" class="mb-3" novalidate>
                            <div class="mb-3 form-password-toggle">
                                <label class="form-label" for="newPassword">New Password</label>
                                <div class="position-relative">
                                    <input type="password" id="newPassword" class="form-control" name="newPassword"
                                        placeholder="Enter new password" aria-describedby="newPassword"
                                        autocomplete="off" style="padding-right: 45px;" />
                                    <button class="btn btn-link position-absolute top-50 end-0 translate-middle-y"
                                        type="button" id="toggleNewPassword"
                                        style="text-decoration: none; padding: 0 12px; z-index: 10;">
                                        <i class="bx bx-hide" id="toggleNewPasswordIcon"
                                            style="font-size: 1.2rem; color: #697a8d;"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-3 form-password-toggle">
                                <label class="form-label" for="confirmPassword">Confirm Password</label>
                                <div class="position-relative">
                                    <input type="password" id="confirmPassword" class="form-control"
                                        name="confirmPassword" placeholder="Confirm new password"
                                        aria-describedby="confirmPassword" autocomplete="off"
                                        style="padding-right: 45px;" />
                                    <button class="btn btn-link position-absolute top-50 end-0 translate-middle-y"
                                        type="button" id="toggleConfirmPassword"
                                        style="text-decoration: none; padding: 0 12px; z-index: 10;">
                                        <i class="bx bx-hide" id="toggleConfirmPasswordIcon"
                                            style="font-size: 1.2rem; color: #697a8d;"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-3">
                                <button class="btn btn-primary d-grid w-100" type="submit">Reset Password</button>
                            </div>
                        </form>

                        <p class="text-center mt-2">
                            <a href="login.html" class="back-home-link">
                                <i class="bx bx-arrow-back"></i>
                                Back to Log In
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Core JS -->
    <script src="../assets/js/jquery.js"></script>
    <script src="../assets/js/popper.js"></script>
    <script src="../assets/js/bootstrap.js"></script>
    <script src="../assets/js/perfect-scrollbar.js"></script>
    <script src="../assets/js/menu.js"></script>
    <script src="../assets/js/main.js"></script>

    <!-- Page JS -->
    <script src="../assets/js/reset-password.js"></script>
</body>

</html>
