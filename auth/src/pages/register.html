<!DOCTYPE html>
<html lang="en" class="light-style customizer-hide" dir="ltr" data-theme="theme-default" data-assets-path="../assets/"
  data-template="vertical-menu-template-free">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

  <title>CAATE | Register</title>

  <meta name="description" content="" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico?v=1" />
  <link rel="shortcut icon" type="image/x-icon" href="../assets/images/favicon.ico?v=1" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet" />

  <!-- Icons. Uncomment required icon fonts -->
  <link rel="stylesheet" href="../assets/css/boxicons.css" />

  <!-- Core CSS -->
  <link rel="stylesheet" href="../assets/css/core.css" class="template-customizer-core-css" />
  <link rel="stylesheet" href="../assets/css/theme-default.css" class="template-customizer-theme-css" />
  <link rel="stylesheet" href="../assets/css/demo.css" />

  <!-- Vendors CSS -->
  <link rel="stylesheet" href="../assets/css/perfect-scrollbar.css" />

  <!-- Page CSS -->
  <!-- Page -->
  <link rel="stylesheet" href="../assets/css/page-auth.css" />

  <!-- Custom Auth Styles - CAATE Theme -->
  <link rel="stylesheet" href="../assets/css/auth-custom.css" />

  <!-- Password Toggle Fix -->
  <link rel="stylesheet" href="../assets/css/password-fix.css" />

  <!-- Helpers -->
  <script src="../assets/js/helpers.js"></script>

  <!--! Template customizer & Theme config files MUST be included after core stylesheets and helpers.js in the <head> section -->
  <!--? Config:  Mandatory theme config file contain global vars & default theme options, Set your preferred theme option in this file.  -->
  <script src="../assets/js/config.js"></script>
</head>

<body>
  <!-- Dark Overlay -->
  <div class="dark-overlay"></div>

  <!-- Animated Orbs Background -->
  <div class="orbs-container">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
  </div>

  <!-- Content -->

  <div class="container-xxl">
    <div class="authentication-wrapper authentication-basic container-p-y">
      <div class="authentication-inner">
        <!-- Register -->
        <div class="card register-card">
          <div class="card-body">
            <!-- Hero Logos -->
            <div class="hero-logos">
              <img src="../assets/images/ROUNDCAATELOGO.png" alt="CAATE Logo" class="hero-logo caate-logo" />
            </div>
            <!-- /Hero Logos -->
            <h4 class="mb-2">REGISTER</h4>
            <p class="mb-4">Please enter your information and submit to create an account.</p>

            <form id="formAuthentication" class="mb-3" action="login.html" method="POST">
              <div class="row">
                <!-- Left Column -->
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="username" name="username"
                      placeholder="Enter your username" autocomplete="username" required />
                  </div>

                  <div class="mb-3">
                    <label for="email" class="form-label">E-Mail Address <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" name="email"
                      placeholder="Enter your email address" autocomplete="email" required />
                  </div>

                  <div class="mb-3">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" id="terms-conditions" required />
                      <label class="form-check-label" for="terms-conditions">
                        I agree to the <a href="javascript:void(0);">privacy policy & terms</a>
                      </label>
                    </div>
                  </div>
                </div>

                <!-- Right Column -->
                <div class="col-md-6">
                  <div class="mb-3 form-password-toggle">
                    <label class="form-label" for="password">Password <span class="text-danger">*</span></label>
                    <div class="position-relative">
                      <input type="password" id="password" class="form-control" name="password"
                        placeholder="Enter your password" aria-describedby="password" autocomplete="new-password"
                        style="padding-right: 45px;" required />
                      <button class="btn btn-link position-absolute top-50 end-0 translate-middle-y" type="button"
                        id="togglePassword" style="text-decoration: none; padding: 0 12px; z-index: 10;">
                        <i class="bx bx-hide" id="togglePasswordIcon" style="font-size: 1.2rem; color: #697a8d;"></i>
                      </button>
                    </div>
                    <small class="form-text text-muted d-block mt-2">
                      Password must be at least 8 characters long and include an uppercase letter, a lowercase letter, a
                      number, and a special character.
                    </small>
                  </div>

                  <div class="mb-3 form-password-toggle">
                    <label class="form-label" for="confirmPassword">Confirm Password <span
                        class="text-danger">*</span></label>
                    <div class="position-relative">
                      <input type="password" id="confirmPassword" class="form-control" name="confirmPassword"
                        placeholder="Confirm your password" aria-describedby="confirmPassword"
                        autocomplete="new-password" style="padding-right: 45px;" required />
                      <button class="btn btn-link position-absolute top-50 end-0 translate-middle-y" type="button"
                        id="toggleConfirmPassword" style="text-decoration: none; padding: 0 12px; z-index: 10;">
                        <i class="bx bx-hide" id="toggleConfirmPasswordIcon"
                          style="font-size: 1.2rem; color: #697a8d;"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div class="mb-3 mt-4">
                <button class="btn btn-primary d-grid w-100" type="submit">Create Account</button>
              </div>
            </form>

            <p class="text-center mt-3">
              <a href="login.html" class="back-home-link">
                <i class="bx bx-arrow-back"></i>
                Back to Login
              </a>
            </p>
          </div>
        </div>
        <!-- /Register -->
      </div>
    </div>
  </div>

  <!-- / Content -->

  <!-- Core JS -->
  <!-- build:js assets/vendor/js/core.js -->
  <script src="../assets/js/jquery.js"></script>
  <script src="../assets/js/popper.js"></script>
  <script src="../assets/js/bootstrap.js"></script>
  <script src="../assets/js/perfect-scrollbar.js"></script>

  <script src="../assets/js/menu.js"></script>
  <!-- endbuild -->

  <!-- Vendors JS -->

  <!-- Main JS -->
  <script src="../assets/js/main.js"></script>

  <!-- Page JS -->
  <script src="../assets/js/register.js"></script>
</body>

</html>
