<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Authentication</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .debug-info {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .debug-info h3 {
            margin-top: 0;
        }

        .debug-info pre {
            background: white;
            padding: 10px;
            border-radius: 3px;
            overflow-x: auto;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Authentication Debug Tool</h1>

    <div class="debug-info">
        <h3>Current localStorage Data:</h3>
        <pre id="localStorageData"></pre>
    </div>

    <div class="debug-info">
        <h3>Current sessionStorage Data:</h3>
        <pre id="sessionStorageData"></pre>
    </div>

    <div class="debug-info">
        <h3>Actions:</h3>
        <button onclick="refreshData()">Refresh Data</button>
        <button onclick="clearAllStorage()">Clear All Storage</button>
        <button onclick="testAdminAccess()">Test Admin Access</button>
        <button onclick="testTraineeAccess()">Test Trainee Access</button>
    </div>

    <script>
        function refreshData() {
            // Display localStorage
            const localStorageObj = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                localStorageObj[key] = localStorage.getItem(key);
            }
            document.getElementById('localStorageData').textContent = JSON.stringify(localStorageObj, null, 2);

            // Display sessionStorage
            const sessionStorageObj = {};
            for (let i = 0; i < sessionStorage.length; i++) {
                const key = sessionStorage.key(i);
                sessionStorageObj[key] = sessionStorage.getItem(key);
            }
            document.getElementById('sessionStorageData').textContent = JSON.stringify(sessionStorageObj, null, 2);
        }

        function clearAllStorage() {
            localStorage.clear();
            sessionStorage.clear();
            refreshData();
            alert('All storage cleared!');
        }

        function testAdminAccess() {
            window.location.href = 'admin/src/pages/manage-profile.html';
        }

        function testTraineeAccess() {
            window.location.href = 'trainee/src/pages/manage-profile.html';
        }

        // Load data on page load
        refreshData();
    </script>
</body>

</html>
