<!DOCTYPE html>
<html>

<head>
    <title>Create Fahhh Sound</title>
</head>

<body>
    <h1>Create Fahhh Sound</h1>
    <button onclick="createAndDownloadSound()">Create & Download Fahhh Sound</button>
    <button onclick="playTestSound()">Test Generated Sound</button>

    <script>
        function createAndDownloadSound() {
            // Create audio context
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();

            // Create a longer "fahhh" sound (2 seconds)
            const sampleRate = audioContext.sampleRate;
            const duration = 2; // 2 seconds
            const frameCount = sampleRate * duration;

            // Create audio buffer
            const audioBuffer = audioContext.createBuffer(1, frameCount, sampleRate);
            const channelData = audioBuffer.getChannelData(0);

            // Generate "fahhh" sound - descending frequency with noise
            for (let i = 0; i < frameCount; i++) {
                const t = i / sampleRate;
                const progress = t / duration;

                // Descending frequency from 600Hz to 100Hz
                const frequency = 600 * Math.pow(0.167, progress); // 600 * (100/600)^progress

                // Generate sawtooth wave with some noise
                const phase = (frequency * t * 2 * Math.PI) % (2 * Math.PI);
                let sample = (phase / Math.PI) - 1; // Sawtooth wave

                // Add some noise for texture
                sample += (Math.random() - 0.5) * 0.1;

                // Apply envelope (fade out)
                const envelope = Math.pow(1 - progress, 2);
                sample *= envelope * 0.6; // Increased volume from 0.3 to 0.6

                channelData[i] = sample;
            }

            // Convert to WAV and download
            const wavBuffer = audioBufferToWav(audioBuffer);
            const blob = new Blob([wavBuffer], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'nav-sound.mp3'; // Note: This will actually be a WAV file
            a.click();

            URL.revokeObjectURL(url);
            alert('Sound file created and downloaded as nav-sound.mp3 (actually WAV format)');
        }

        function playTestSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            // "Fahhh" sound
            oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 2);
            oscillator.type = 'sawtooth';

            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime); // Increased from 0.2 to 0.5
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 2);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 2);
        }

        // Convert AudioBuffer to WAV format
        function audioBufferToWav(buffer) {
            const length = buffer.length;
            const sampleRate = buffer.sampleRate;
            const arrayBuffer = new ArrayBuffer(44 + length * 2);
            const view = new DataView(arrayBuffer);

            // WAV header
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, length * 2, true);

            // Convert float samples to 16-bit PCM
            const channelData = buffer.getChannelData(0);
            let offset = 44;
            for (let i = 0; i < length; i++) {
                const sample = Math.max(-1, Math.min(1, channelData[i]));
                view.setInt16(offset, sample * 0x7FFF, true);
                offset += 2;
            }

            return arrayBuffer;
        }
    </script>
</body>

</html>
